# set-option -g default-command "reattach-to-user-namespace -l bash"
# status bar

set-option -g default-command "/bin/zsh -i"

################
## Status Bar ##
################
set -g status-position top
# set -g status-justify left
# set -g status-bg colour075
set -g status-bg colour33
set -g status-fg colour8
set -g status-left-length 141
set -g status-right-length 140
set -g status-interval 1

# Status Bar - Left
# set -g status-left '#[fg=green]#H #[fg=black]• #[fg=green,bright]#(uname -r | cut -c 1-6)#[default]'
set -g status-left '#[fg=colour255,bg=colour208,bold] 󰈐 #S #[fg=colour208,bg=colour33]'
# set -g window-status-current-format "#[fg=black,bold bg=default]│#[fg=colour135 bg=black]#W#[fg=black,bold bg=default]│"


# Tabs
set -g window-status-separator '#[fg=colour33,bg=colour33] '
set -g window-status-format '#[fg=colour33,bg=colour60]#[fg=colour255,bg=colour60] #I: #W #{?window_last_flag,󰘁 ,}#[fg=colour60,bg=colour33]'
set -g window-status-current-format '#[fg=colour33,bg=colour084]#[fg=colour0,bg=colour084,bold] #I: #W #[fg=colour084,bg=colour33]'
# set -g window-status-current-fg colour0
# set -g window-status-current-bg colour001

# Status Bar - Right
# set -g @sysstat_mem_view_tmpl '#{mem.used}/#{mem.total}'
# set -g status-right ' ♫ #{spotify_status} #{spotify_artist}: #{spotify_track} #[bg=colour047]#[fg=black] 🔋 #{battery_percentage} 🖥️ #{cpu_percentage} ⚡#{sysstat_mem} #[bg=colour162,fg=colour255] ⌚ %d %b %Y %I:%M %p '
set -g status-right '#[fg=colour162,bg=colour33]#[fg=colour255,bg=colour162] %d %b %Y %I:%M %p #[fg=colour60,bg=colour162]#[fg=colour255,bg=colour60] #h'

#####################
## Panes & Windows ##
#####################

# Different styles for active and inactive windows
# set -g window-style 'fg=colour247,bg=colour236'
# set -g window-active-style 'fg=colour250,bg=black'
# set -g window-style 'bg=colour235'
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
# set -g window-active-style 'bg=colour236'


# Pane border
set -g pane-active-border-style 'fg=colour084'
set -g pane-border-style 'fg=colour60'
set -g pane-border-lines heavy
set -g pane-border-indicators off
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[reverse],}#{pane_title}#[default] '

# Set window split
bind-key b split-window -h
bind-key v split-window -v
bind-key W choose-tree -Z

# default window title colors
# set-window-option -g window-status-fg colour244 #base0
# set-window-option -g window-status-bg default

# Messages
# set-option -g message-bg black
# set-option -g message-fg red

# pane number display
# set-option -g display-panes-active-colour colour33 #blue
# set-option -g display-panes-colour colour166 #orange
# clock
# set-window-option -g clock-mode-colour green #green


# C-b is not acceptable -- Vim uses it
unbind C-b
set-option -g prefix C-a
bind-key C-a last-window

# Start numbering at 1
set -g base-index 1

# Allows for faster key repetition
set -s escape-time 0

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Allows us to use C-a a <command> to send commands to a TMUX session inside
# another TMUX session
bind-key a send-prefix

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Highlight active window
#set-window-option -g window-status-current-bg red

# Vi copypaste mode
set-window-option -g mode-keys vi
bind-key 'p' run-shell "tmux set-buffer \"$(pbpaste)\";tmux paste-buffer"
bind-key 'y' send-keys x\; run-shell "tmux show-buffer | pbcopy"\; display-message "copied"

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind Left resize-pane -L 10
bind Right resize-pane -R 2
bind Up resize-pane -U 10
bind Down resize-pane -D 2

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# auto window rename
set-window-option -g automatic-rename on

# rm mouse mode fail
set -g mouse on

# color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -s command-alias ks='kill-session'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @emulate-scroll-for-no-mouse-alternate-buffer on
set -g @scroll-without-changing-pane on
set -g @scroll-down-exit-copy-mode off
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'samoshkin/tmux-plugin-sysstat'
set -g @plugin 'tmux-plugins/tmux-sidebar'
# set -g @plugin 'b0o/tmux-autoreload'
# set -g @plugin 'robhurring/tmux-spotify'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

