---
- name: Setup local workstation with dotfiles and tools
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    repo_root: "{{ playbook_dir }}/.."
    home: "{{ lookup('env','HOME') }}"
    configs_dir: "{{ repo_root }}/configs"
    scripts_dir: "{{ repo_root }}/scripts"
    # Use a dedicated clone dir for Powerline fonts to avoid conflicts with repo's own fonts directory
    powerline_fonts_dir: "{{ repo_root }}/.powerline-fonts"
    # RubyMine config in repo (optional)
    rubymine_repo_dir: "{{ configs_dir }}/rubymine"
  roles:
    - role: platform_base
      tags:
        - platform
    - role: dotfiles_links
      tags:
        - dotfiles
    - role: editor_setup
      tags:
        - editor
    - role: terminal_setup
      tags:
        - terminal
    - role: shell_setup
      tags:
        - shell
    - role: tools_setup
      tags:
        - tools
