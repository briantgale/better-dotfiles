---
- name: Create symlinks for dotfiles
  file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "{{ configs_dir }}/tmux/.tmux.conf",          dest: "{{ home }}/.tmux.conf" }
    - { src: "{{ scripts_dir }}/git/git-completion.sh",     dest: "{{ home }}/.git-completion.sh" }
    - { src: "{{ scripts_dir }}/git/git-prompt.sh",         dest: "{{ home }}/.git-prompt.sh" }
    - { src: "{{ configs_dir }}/git/.gitconfig",            dest: "{{ home }}/.gitconfig" }
    - { src: "{{ configs_dir }}/shell/common.sh",           dest: "{{ home }}/.dotfiles-common.sh" }
    - { src: "{{ configs_dir }}/shell/motd.sh",             dest: "{{ home }}/.dotfiles-motd.sh" }
    - { src: "{{ configs_dir }}/shell/bash/.bash_profile",  dest: "{{ home }}/.bash_profile" }
    - { src: "{{ configs_dir }}/shell/bash/.bashrc",        dest: "{{ home }}/.bashrc" }
    - { src: "{{ scripts_dir }}/shell/.fzf-tmux.sh",         dest: "{{ home }}/.fzf-tmux.sh" }
    - { src: "{{ configs_dir }}/shell/zsh/.zshrc",          dest: "{{ home }}/.zshrc" }
    - { src: "{{ configs_dir }}/tmux/railsapp.yml",         dest: "{{ home }}/.config/tmuxinator/railsapp.yml" }
    - { src: "{{ configs_dir }}/editor/.ideavimrc",         dest: "{{ home }}/.ideavimrc" }
