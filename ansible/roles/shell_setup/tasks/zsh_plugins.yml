---
- name: Link Spaceship theme into Oh My Zsh custom themes
  shell: |
    ZSH_CUSTOM_DIR="${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}"
    mkdir -p "$ZSH_CUSTOM_DIR/themes"
    SPACESHIP_ZSH="$(brew --prefix)/opt/spaceship/spaceship.zsh"
    if [ -f "$SPACESHIP_ZSH" ]; then
      ln -sf "$SPACESHIP_ZSH" "$ZSH_CUSTOM_DIR/themes/spaceship.zsh-theme"
    fi
  changed_when: false
  failed_when: false

- name: Install zsh plugins (syntax highlighting and autosuggestions)
  shell: |
    ZSH_CUSTOM_DIR="${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}"
    mkdir -p "$ZSH_CUSTOM_DIR/plugins"
    if [ ! -d "$ZSH_CUSTOM_DIR/plugins/zsh-syntax-highlighting/.git" ]; then
      git clone https://github.com/zsh-users/zsh-syntax-highlighting.git "$ZSH_CUSTOM_DIR/plugins/zsh-syntax-highlighting"
    else
      (cd "$ZSH_CUSTOM_DIR/plugins/zsh-syntax-highlighting" && git pull --ff-only)
    fi
    if [ ! -d "$ZSH_CUSTOM_DIR/plugins/zsh-autosuggestions/.git" ]; then
      git clone https://github.com/zsh-users/zsh-autosuggestions "$ZSH_CUSTOM_DIR/plugins/zsh-autosuggestions"
    else
      (cd "$ZSH_CUSTOM_DIR/plugins/zsh-autosuggestions" && git pull --ff-only)
    fi
  changed_when: false
  failed_when: false
